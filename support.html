<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NoSkip — Support</title>
<style>
  :root{
    --ink:#16181d; --muted:#5b6470; --line:#e6e8ec; --bg:#ffffff;
    --accent:#1f6feb; --maxw:720px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:0 20px;
  }
  .wrap{max-width:var(--maxw); margin:0 auto; padding:48px 0 80px}
  header{border-bottom:1px solid var(--line); padding-bottom:24px; margin-bottom:32px}
  h1{font-size:1.7rem; line-height:1.25; margin:0 0 6px}
  h2{font-size:1.18rem; margin:38px 0 10px; line-height:1.3}
  p,li{color:var(--ink)}
  .meta{color:var(--muted); font-size:.9rem; margin:0}
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}
  footer{margin-top:48px; padding-top:20px; border-top:1px solid var(--line); color:var(--muted); font-size:.88rem}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>NoSkip — Support</h1>
  <p class="meta">We're here to help.</p>
</header>

<h2>Get in touch</h2>
<p>Questions? Email <a href="mailto:nahomghirmayeyob@gmail.com">nahomghirmayeyob@gmail.com</a>.</p>

<footer>
  &copy; 2026 NoSkip. Contact: <a href="mailto:nahomghirmayeyob@gmail.com">nahomghirmayeyob@gmail.com</a> &middot; <a href="privacy.html">Privacy Policy</a>
</footer>
</div>
</body>
</html>
